# ══════════════════════════════════════════════════════════════════════
# Configuración central de proyecto-urbano-agentivo
# Todas las rutas son relativas a la raíz del proyecto salvo que sean absolutas.
# ══════════════════════════════════════════════════════════════════════

database:
  ruta: database/detecciones.db

geoespacial:
  manzanas_geojson: config/hipodromo_manzanas.geojson   # polígonos con clave CVEGEO
  coordenadas_trafico: config/coordenadas_trafico.xlsx  # calles de referencia TomTom

# ── Pool de modelos de fachada (7 × YOLO11, heredados del proyecto 1) ──
# 'fallback' es el peso COCO preentrenado que se usa si el checkpoint no existe.
modelos_fachada:
  techo:           {pesos: config/checkpoints/techo_best.pt,           fallback: yolo11x.pt, nombre: "Techos (satelital)"}
  fachada:         {pesos: config/checkpoints/fachada_best.pt,         fallback: yolo11x.pt, nombre: "Fachadas (estructura + daños)"}
  ventanas:        {pesos: config/checkpoints/ventanas_best.pt,        fallback: yolo11l.pt, nombre: "Ventanas"}
  fachada_general: {pesos: config/checkpoints/fachada_general_best.pt, fallback: yolo11l.pt, nombre: "Fachada general (arquitectónico)"}
  danos:           {pesos: config/checkpoints/danos_best.pt,           fallback: yolo11l.pt, nombre: "Daños/deterioro"}
  senales:         {pesos: config/checkpoints/senales_best.pt,         fallback: yolo11l.pt, nombre: "Señalamiento vial"}
  calles:          {pesos: config/checkpoints/calles_best.pt,          fallback: yolo11l.pt, nombre: "Calles (vehículos/peatones)"}

# ── Modelo satelital (YOLOv8-XL seg, heredado del proyecto 2) ──
satelite:
  pesos: config/checkpoints/satelite_yolov8xl_seg.pt
  tile_size: 1280
  overlap_px: 64
  escala_m_px: 0.30          # metros por píxel de la imagen satelital
  # Esquinas por defecto del área de estudio (La Condesa)
  lat_nw: 19.4130
  lon_nw: -99.1780
  lat_se: 19.4080
  lon_se: -99.1720

# ── Comparador de 5 modelos de ventanas (heredado del proyecto 3) ──
comparador:
  yolov8_det: config/checkpoints/comparador/yolov8_det_best.pt
  yolov8_seg: config/checkpoints/comparador/yolov8_seg_best.pt
  yolov11_seg: config/checkpoints/comparador/yolov11_seg_best.pt
  detectron2_pesos: config/checkpoints/comparador/detectron2_best.pth
  detectron2_base_cfg: COCO-Detection/faster_rcnn_R_50_FPN_3x.yaml
  detectron2_umbral_carga: 0.05   # el conf real del usuario se filtra después
  env_sam3_python: src/tools/env_sam3/bin/python3
  sam3_prompt_defecto: window

# ── Inferencia ──
inferencia:
  conf_por_defecto: 0.25
  altura_piso_m: 3.0          # pisos → metros
  umbral_fila_factor: 0.6     # estimar_pisos_por_filas: fracción del alto promedio
  umbral_fila_minimo: 0.02

# ── Agente de Visión: decisión autónoma ──
vision:
  umbral_confianza_oraculo: 0.65   # si conf. promedio YOLO11 < 65% → invocar comparador (Detectron2/SAM3)

# ── Tráfico (TomTom + perfil histórico de respaldo) ──
trafico:
  api_key_env: TOMTOM_API_KEY      # la key SIEMPRE por variable de entorno, nunca en archivos
  url: https://api.tomtom.com/traffic/services/4/flowSegmentData/absolute/10/json
  timeout_s: 10
  retencion_dias: 90
  curvas_historicas: config/curvas_congestion_condesa.json

# ── Score de riesgo por manzana (fórmula unificada, heredada del proyecto 1) ──
riesgo:
  peso_danos: 0.4
  peso_congestion: 0.3
  peso_altura: 0.3
  danos_normalizacion: 10     # 10+ puntos de daño ponderado = 1.0
  pisos_normalizacion: 10     # 10+ pisos promedio = 1.0
  factor_confianza_k: 0.5     # confianza = 1 - e^(-k * num_fotos)
  horas_pico: [[8, 10], [18, 20]]
  # Severidad por clase de daño (sumar parejo hacía que 5 manchas de humedad
  # pesaran igual que 5 columnas con varilla expuesta)
  peso_dano_por_clase:
    crack: 1.0
    concrete_spalling: 1.0
    exposed_reinforcement: 1.0
    corrosion: 1.0
    peeling_plaster: 0.5
    tile_detachment: 0.5
    ac_bracket_corrosion: 0.5
    delamination: 0.5
    paint_defect: 0.1
    dirty_mold: 0.1

# ── Población expuesta (heredado del proyecto 2, página de Fusión) ──
poblacion:
  m2_por_habitante: 35        # norma urbana: 35 m² construidos por habitante
  ventanas_por_piso: 4        # constante de fusión ventanas → pisos (respaldo)
